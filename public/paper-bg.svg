<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"></feTurbulence><feColorMatrix values="0 0 0 0 0.06  0 0 0 0 0.05  0 0 0 0 0.04  0 0 0 0.18 0"></feColorMatrix></filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <circle cx="3" cy="3" r="1.4" fill="#0f0d09" opacity="0.18"></circle>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="#f0e8d2"></rect>
  <rect width="1200" height="800" fill="url(#dots)"></rect>
  <rect width="1200" height="800" filter="url(#grain)"></rect>
</svg>